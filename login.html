<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>INICIAR SESIÓN</h2>

<input type="email" id="email" placeholder="Correo"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>

<button onclick="login()" class="btn">Ingresar</button>
<button onclick="registro()" class="btn">Registrarse</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);
  window.location.href = "index.html";
};

window.registro = async () => {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, password);
  alert("Usuario creado");
};
</script>

</body>
</html>
