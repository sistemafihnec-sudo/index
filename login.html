<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FIHNEC - Login</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
<div class="app">
  <img src="logo.png" class="logo">
  <h2 class="titulo">FIHNEC</h2>
  <p class="sub">Sistema Administrativo</p>

  <div class="card">

    <input id="email" placeholder="Correo">
    <input id="password" placeholder="Contraseña">

    <div id="camposRegistro" style="display:none;">
      <input id="codigo" placeholder="Código">
      <input id="nombre" placeholder="Nombre">
      <input id="ciudad" placeholder="Ciudad">
      <input id="local" placeholder="Local">
    </div>

    <button id="btnAccion">Ingresar</button>

    <div class="links">
      <span onclick="modoRegistro()">Crear cuenta</span>
      <span onclick="modoLogin()">Ya tengo cuenta</span>
    </div>

    <p id="msg"></p>

  </div>

</div><!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// REGISTRO
function registro(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let codigo = document.getElementById("codigo").value.toUpperCase();
  let nombre = document.getElementById("nombre").value;
  let ciudad = document.getElementById("ciudad").value;
  let local = document.getElementById("local").value;

  if(!email || !password || !codigo || !nombre || !ciudad || !local){
    msg.innerText = "Completa todos los campos";
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
  .then(user => {

    db.collection("sedes").doc(codigo).set({
      nombre,
      ciudad,
      local
    });

    db.collection("usuarios").doc(user.user.uid).set({
      email,
      codigoCapitulo: codigo,
      rol: "tesorero"
    });

    msg.innerText = "Registro completo";

  })
  .catch(e => msg.innerText = e.message);
}

// LOGIN
function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    window.location.href = "index.html";
  })
  .catch(e => msg.innerText = e.message);
}

// RECUPERAR
function recuperar(){
  let email = document.getElementById("email").value;

  auth.sendPasswordResetEmail(email)
  .then(() => msg.innerText = "Correo enviado")
  .catch(e => msg.innerText = e.message);
}
function modoRegistro(){
  document.getElementById("camposRegistro").style.display = "block";
}

function modoLogin(){
  document.getElementById("camposRegistro").style.display = "none";
}
  function modoRegistro(){
  document.getElementById("camposRegistro").style.display = "block";

  // cambia botón principal
  document.getElementById("btnAccion").innerText = "Registrar";
  document.getElementById("btnAccion").onclick = registro;
}

function modoLogin(){
  document.getElementById("camposRegistro").style.display = "none";

  // cambia botón principal
  document.getElementById("btnAccion").innerText = "Ingresar";
  document.getElementById("btnAccion").onclick = login;
}

// iniciar en login
window.onload = modoLogin;
</script>

</body>
</html>
