<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN
window.login = async () => {
  try{
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    window.location.href = "index.html";

  }catch(e){
    document.getElementById("mensaje").innerText = e.message;
  }
};

// 🆕 REGISTRO
window.registro = async () => {
  try{
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let codigo = document.getElementById("codigo").value.toUpperCase();
    let nombre = document.getElementById("nombreCapitulo").value;
    let ciudad = document.getElementById("ciudad").value;
    let local = document.getElementById("local").value;

    if(!email || !password || !codigo || !nombre || !ciudad || !local){
      document.getElementById("mensaje").innerText = "Completa todos los campos";
      return;
    }

    // 🔥 Crear sede si no existe
    const sedeRef = doc(db, "sedes", codigo);
    const sedeSnap = await getDoc(sedeRef);

    if(!sedeSnap.exists()){
      await setDoc(sedeRef, {
        nombre: nombre,
        ciudad: ciudad,
        local: local,
        codigo: codigo
      });
    }

    // 🔥 Crear usuario
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "usuarios", user.uid), {
      email: email,
      rol: "tesorero",
      codigoCapitulo: codigo
    });

    document.getElementById("mensaje").innerText = "Registro completo";

  }catch(e){
    document.getElementById("mensaje").innerText = e.message;
  }
};

// 🔑 RECUPERAR CONTRASEÑA
window.recuperar = async () => {
  try{
    let email = document.getElementById("email").value;

    await sendPasswordResetEmail(auth, email);

    document.getElementById("mensaje").innerText = "Correo enviado";

  }catch(e){
    document.getElementById("mensaje").innerText = e.message;
  }
};

</script>
