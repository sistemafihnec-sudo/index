<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login FIHNEC</title>
<link rel="stylesheet" href="style.css">

<style>
input{
  padding:10px;
  margin:5px;
  width:80%;
}

.opciones button{
  margin:5px;
}
</style>

</head>

<body>

<h2>FIHNEC - ACCESO</h2>

<input type="email" id="email" placeholder="Correo"><br>
<input type="password" id="password" placeholder="Contraseña"><br>
<input type="text" id="codigo" placeholder="Código de Capítulo"><br>
<input type="text" id="nombreCapitulo" placeholder="Nombre del Capítulo"><br>
<input type="text" id="ciudad" placeholder="Ciudad"><br>
<input type="text" id="local" placeholder="Local"><br>

<div class="opciones">
  <button onclick="login()" class="btn">Ingresar</button>
  <button onclick="registro()" class="btn">Registrarse</button>
  <button onclick="recuperar()" class="btn">Recuperar Contraseña</button>
</div>

<p id="mensaje"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 TU CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = async () => {
  try{
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    window.location.href = "index.html";

  }catch(e){
    document.getElementById("mensaje").innerText = "Error: " + e.message;
  }
};

// 🆕 REGISTRO
window.registro = async () => {
  try{
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let codigo = document.getElementById("codigo").value.toUpperCase();
    let nombre = document.getElementById("nombreCapitulo").value;
    let ciudad = document.getElementById("ciudad").value;
    let local = document.getElementById("local").value;
    let rol = document.getElementById("rol").value;

    if(!email || !password || !codigo || !nombre || !ciudad || !local){
      document.getElementById("mensaje").innerText = "Completa todos los campos";
      return;
    }

    const sedeRef = doc(db, "sedes", codigo);
    const sedeSnap = await getDoc(sedeRef);

    if(!sedeSnap.exists()){
      await setDoc(sedeRef, {
        nombre: nombre,
        ciudad: ciudad,
        local: local,
        codigo: codigo
      });
    }

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "usuarios", user.uid), {
      email: email,
      rol: rol,
      codigoCapitulo: codigo
    });

    document.getElementById("mensaje").innerText = "Registro completo";

  }catch(e){
    document.getElementById("mensaje").innerText = e.message;
  }
};
};

// 🔑 RECUPERAR CONTRASEÑA
window.recuperar = async () => {
  try{
    let email = document.getElementById("email").value;

    await sendPasswordResetEmail(auth, email);

    document.getElementById("mensaje").innerText = "Correo de recuperación enviado";

  }catch(e){
    document.getElementById("mensaje").innerText = "Error: " + e.message;
  }
};

</script>

</body>
</html>
