<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📊 REGISTROS TESORERÍA</h2>

<table id="tablaTesoreria">
<tr>
<th>Fecha</th>
<th>Saldo Inicial</th>
<th>Ingresos</th>
<th>Egresos</th>
<th>Saldo Final</th>
</tr>
</table>

<h2>📋 REGISTROS SECRETARÍA</h2>

<table id="tablaSecretaria">
<tr>
<th>Fecha</th>
<th>Visitas</th>
<th>Miembros</th>
<th>Invitados</th>
<th>Asistencia</th>
</tr>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API",
  authDomain: "TU_DOMINIO",
  projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CARGAR TESORERÍA
async function cargarTesoreria(){

  const querySnapshot = await getDocs(collection(db, "tesoreria"));

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    let fila = `
      <tr>
        <td>${new Date(data.fecha.seconds * 1000).toLocaleDateString()}</td>
        <td>${data.saldoInicial}</td>
        <td>${data.totalIngresos}</td>
        <td>${data.totalEgresos}</td>
        <td>${data.saldoFinal}</td>
      </tr>
    `;

    document.getElementById("tablaTesoreria").innerHTML += fila;

  });
}

// 🔥 CARGAR SECRETARÍA
async function cargarSecretaria(){

  const querySnapshot = await getDocs(collection(db, "secretaria"));

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    let fila = `
      <tr>
        <td>${new Date(data.fecha.seconds * 1000).toLocaleDateString()}</td>
        <td>${data.visitas1}</td>
        <td>${data.miembros1}</td>
        <td>${data.invitados1}</td>
        <td>${data.asistencia1}</td>
      </tr>
    `;

    document.getElementById("tablaSecretaria").innerHTML += fila;

  });
}

// Ejecutar
cargarTesoreria();
cargarSecretaria();

</script>

</body>
</html>
