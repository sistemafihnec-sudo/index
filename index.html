<!DOCTYPE html>
<html>
<head>
  <title>Login Sistema</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Correo"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Ingresar</button>

<p id="mensaje"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AQUI_TU_API_KEY",
    authDomain: "AQUI",
    projectId: "AQUI",
    storageBucket: "AQUI",
    messagingSenderId: "AQUI",
    appId: "AQUI"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        document.getElementById("mensaje").innerText = "Bienvenido 🚀";
        console.log(userCredential.user);
      })
      .catch((error) => {
        document.getElementById("mensaje").innerText = "Error: " + error.message;
      });
  }
</script>

</body>
</html>
