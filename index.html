<!DOCTYPE html>
<html lang="es">
<head>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIHNEC</title>
  <p id="infoUsuario"></p>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <img src="logo.png" class="logo">

  <h2>Bienvenido</h2>
  <p id="infoUsuario"></p>

  <div class="grid">

    <div class="card-btn" onclick="irTesoreria()">
      💰<br>TESORERÍA
    </div>

    <div class="card-btn" onclick="irSecretaria()">
      📋<br>SECRETARÍA
    </div>

    <div class="card-btn" onclick="verReportes()">
      📊<br>REPORTES
    </div>

  </div>

  <button onclick="logout()">Cerrar sesión</button>

</div>
<script>
function logout(){
  window.location.href = "login.html";
}
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// CONFIG (igual que login)
const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 DETECTAR USUARIO
auth.onAuthStateChanged(async (user) => {

  if(user){

    const docUser = await db.collection("usuarios").doc(user.uid).get();

    if(docUser.exists){

      const data = docUser.data();

      document.getElementById("infoUsuario").innerText =
        "Usuario: " + data.email +
        " | Capítulo: " + data.codigoCapitulo +
        " | Rol: " + data.rol;

    }

  }else{
    // si no hay sesión → regresar a login
    window.location.href = "login.html";
  }

});

</script>
</body>
</html>
