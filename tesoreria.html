<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>TESORERÍA</h2>
<button onclick="nuevoEvento()">Nuevo Evento</button>

<table>
<input type="number" id="saldoInicial" placeholder="Saldo inicial">

<tr><th colspan="2">Ingresos</th></tr>
<tr><td>Servicios Vendidos</td><td><input id="i1" oninput="calcular()"></td></tr>
<tr><td>Ofrendas/Sobres</td><td><input id="i2" oninput="calcular()"></td></tr>
<tr><td>Diezmos/Miembros</td><td><input id="i3" oninput="calcular()"></td></tr>
<tr><td>Otros Ingresos</td><td><input id="i4" oninput="calcular()"></td></tr>

<tr><td>Total</td><td id="totalI"></td></tr>
<tr><td>Disponible</td><td id="totalD"></td></tr>

<tr><th colspan="2">Egresos</th></tr>
<tr><td>Diezmo Oficina Nacional</td><td><input id="e1" oninput="calcular()"></td></tr>
<tr><td>Ofrenda al Testimonio</td><td><input id="e2" oninput="calcular()"></td></tr>
<tr><td>Factura</td><td><input id="e3" oninput="calcular()"></td></tr>
<tr><td>Medias Becas</td><td><input id="e4" oninput="calcular()"></td></tr>
<tr><td>Otros Gastos</td><td><input id="e5" oninput="calcular()"></td></tr>

<tr><td>Total</td><td id="totalE"></td></tr>
<tr><td>Final</td><td id="saldoF"></td></tr>
</table>

<button class="btn" onclick="guardarTesoreria()">Guardar</button>

<script type="module" src="app.js"></script>
<script>

const firebaseConfig = {
  apiKey: "AIzaSyB1SeqgsMF6qFSEm8M4rlF9QeBP2F2HP4Q",
  authDomain: "sistema2026-fihnec.firebaseapp.com",
  projectId: "sistema2026-fihnec"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let codigoUsuario = "";

auth.onAuthStateChanged(async (user) => {

  if(user){

    const docUser = await db.collection("usuarios").doc(user.uid).get();
    const data = docUser.data();

    codigoUsuario = data.codigoCapitulo;

    console.log("Mi código:", codigoUsuario);
  }else{
    window.location.href = "login.html";
  }

});

</script>
<script>

let codigoUsuario = "";

auth.onAuthStateChanged(async (user) => {

  if(user){
    const docUser = await db.collection("usuarios").doc(user.uid).get();
    codigoUsuario = docUser.data().codigoCapitulo;
  }

});

function guardar(){

  db.collection("tesoreria").add({
    codigoCapitulo: codigoUsuario,
    saldoInicial: 100,
    fecha: new Date()
  });

  alert("Guardado correctamente");

}

</script>
<script>

async function nuevoEvento(){

  const snapshot = await db.collection("tesoreria")
    .where("codigoCapitulo", "==", codigoUsuario)
    .orderBy("fecha", "desc")
    .limit(1)
    .get();

  if(!snapshot.empty){

    const ultimo = snapshot.docs[0].data();

    document.getElementById("saldoInicial").value = ultimo.saldoFinal;

  }else{

    document.getElementById("saldoInicial").value = 0;

  }

  alert("Nuevo evento listo");

}

</script>

</body>
</html>
