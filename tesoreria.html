<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesorería</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>CONTROL DE TESORERÍA</h2>

<table>

<tr>
<td>Saldo Inicial</td>
<td><input type="number" id="saldoInicial" oninput="calcular()"></td>
</tr>

<tr><th colspan="2">INGRESOS</th></tr>

<tr><td>Servicios</td><td><input type="number" id="i1" oninput="calcular()"></td></tr>
<tr><td>Ofrendas</td><td><input type="number" id="i2" oninput="calcular()"></td></tr>
<tr><td>Diezmos</td><td><input type="number" id="i3" oninput="calcular()"></td></tr>
<tr><td>Otros</td><td><input type="number" id="i4" oninput="calcular()"></td></tr>

<tr class="total"><td>Total Ingresos</td><td id="totalI">0</td></tr>
<tr class="total"><td>Total Disponible</td><td id="totalD">0</td></tr>

<tr><th colspan="2">EGRESOS</th></tr>

<tr><td>Diezmo Nacional</td><td><input type="number" id="e1" oninput="calcular()"></td></tr>
<tr><td>Testimonio</td><td><input type="number" id="e2" oninput="calcular()"></td></tr>
<tr><td>Factura</td><td><input type="number" id="e3" oninput="calcular()"></td></tr>
<tr><td>Becas</td><td><input type="number" id="e4" oninput="calcular()"></td></tr>
<tr><td>Otros</td><td><input type="number" id="e5" oninput="calcular()"></td></tr>

<tr class="total"><td>Total Egresos</td><td id="totalE">0</td></tr>
<tr class="total"><td>Saldo Final</td><td id="saldoF">0</td></tr>

</table>

<button onclick="guardarTesoreria()" class="btn">Guardar</button>

<script src="app.js"></script>

</body>
</html>
