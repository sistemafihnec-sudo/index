<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<p id="info"></p>

<script>
  const rol = localStorage.getItem("rol");
  const sede = localStorage.getItem("sede");

  console.log("ROL:", rol);
  console.log("SEDE:", sede);

  document.getElementById("info").innerText =
    "Rol: " + rol + " | Sede: " + sede;
</script>

</body>
</html>
