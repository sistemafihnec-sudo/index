<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<p id="info"></p>

<script>
const rol = localStorage.getItem("rol");

if (!rol) {
  window.location.href = "index.html";
}

if (rol === "admin") {
  document.body.innerHTML += "<h2>Panel Administrador</h2>";
} else if (rol === "tesorero") {
  document.body.innerHTML += "<h2>Panel Tesorero</h2>";
} else if (rol === "secretario") {
  document.body.innerHTML += "<h2>Panel Secretario</h2>";
}
</script>

</body>
</html>
